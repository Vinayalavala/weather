<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png"style="images/png">
    <link rel="stylesheet" href="style.css">
    <title>Weather</title>
</head>
<body>
    <header>
        <img  class="logo" src="weather-app.png">
        <nav>
            <ul class ="links">
                <li a href="#">Services</li>
                <li a href="#">Projects</li>
                <li a href="#">About</li>
            </ul>
        </nav>
       <a href="#" class="btn"><button>Contact</button><a>
    </header>
   <div class="card">
    <div class="search">
        <input type="text" placeholder="Enter a city name" spellcheck="false">
        <button><img src="search.png"></button>
    </div>
    <div class="error">
        <p></p>
    </div>
    <div class="weather">
        <img src="https://cdn-icons-png.flaticon.com/128/4274/4274438.png" class="weather-icon">
        <h1 class="temp">--°c</h1>
        <h2 class="city">--</h2>
        <div class="details">
            <div class="col">
                <img src="humidity.png">
                <div>
                    <p class="humidity">--%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="wind.png">
                <div>
                    <p class="wind">-- KMPH</p>
                    <p>Wind-Speed</p>
                </div>
            </div>
            <div class="col">
                <img src="air.png">
                <div>
                    <p class="pressure">--pa</p>
                    <p>pressure</p>
                </div>
            </div>
        </div>
    </div>
   </div> 

   <script src="index.js"></script>
</body>
</html>
