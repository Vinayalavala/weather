<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png"style="images/png">
    <link rel="stylesheet" href="style.css">
    <title>Weather</title>
</head>
<body>
    <header>
        <h1  class="logo">Weather</h1>
        <input type="checkbox" class="checkbox" id="checkbox">
        <img src="menu-burger.png"  class="menu-bars" alt="">
            <nav>
                <ul class ="links">
                    <li a href="#">Home</li>
                    <li a href="#">Projects</li>
                    <li a href="#">About</li>
                </ul>
            </nav>
            <a href="#" class="btn"><button>Contact</button><a>
    </header>

    <div class="drop-menu">
        <nav>
            <ul class ="links">
                <li a href="#">Home</li>
                <li a href="#">Services</li>
                <li a href="#">About</li>
                <li a href="#">Contact</li>
            </ul>
        </nav>
    </div>

   <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter a city name" spellcheck="false" style="color:white">
            <button><img src="search.png"></button>
        </div>
    <div class="error">
        <p></p>
    </div>
    <div class="weather">
        <img src="https://cdn-icons-png.flaticon.com/128/4274/4274438.png" class="weather-icon">
        <h1 class="temp">--°c</h1>
        <h2 class="city">--</h2>
        <div class="details">
            
            <div class="col">
                <img src="heating.png" class="hot-img">
                <div>
                    <p>Max-Temp</p>
                    <p class="temp_max">--°c</p>
                </div>
            </div><br>
            <div class="col">
                <img src="low-temperature.png" class="hot-img">
                <div>
                    <p>Min-Temp</p>
                    <p class="temp_min">--°c</p>
                </div>
            </div><br>
            <div class="col">
                <img src="hot.png" class="hot-img">
                <div>
                    <p>Feels_like</p>
                    <p class="feels_like">--°c</p>
                </div>
            </div><br>
            <div class="col">
                <img src="humidity.png">
                <div>
                    <p>Humidity</p>
                    <p class="humidity">--%</p>
                    
                </div>
            </div><br>
            <div class="col">
                <img src="wind.png">
                <div>
                    <p>Wind-Speed</p>
                    <p class="wind">-- KMPH</p>
                </div>
            </div><br>

            <div class="col">
                <img class="air-img" src="gust.png">
                <div>
                    <p>Gust</p>
                    <p class="gust">--</p>
                </div>
            </div><br>

            <div class="col">
                <img class="air-img" src="air.png">
                <div>
                    <p>pressure</p>
                    <p class="pressure">--pa</p>
                </div>
            </div><br>

            <div class="col">
                <img class="air-img" src="level.png">
                <div>
                    <p>Ground_level</p>
                    <p class="ground_level">--</p>
                </div>
            </div><br>

            <div class="col">
                <img class="air-img" src="tide.png" class="hot-img">
                <div>
                    <p>Sea_level</p>
                    <p class="sea_level">--</p>
                </div>
            </div><br>



        </div>
    </div>
   </div> 

   <script src="index.js"></script>
</body>
</html>
